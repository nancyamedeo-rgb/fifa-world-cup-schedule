<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 – Schedule</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --gold:#C9A84C; --gold2:#F0C94A; --navy:#0A0E1A; --navy2:#111827;
    --navy3:#1A2235; --gray:#6B7280; --white:#FFFFFF;
    --green:#22C55E; --red:#EF4444; --blue:#3B82F6;
  }
  html, body { width:1920px; height:1080px; overflow:hidden; background:var(--navy); font-family:'Inter',sans-serif; color:var(--white); }

  header {
    display:flex; align-items:center; gap:20px; padding:12px 32px;
    background:linear-gradient(135deg,#0A0E1A 0%,#1A2235 50%,#0D1B3E 100%);
    border-bottom:2px solid var(--gold); height:90px;
  }
  .logo-placeholder {
    width:60px; height:60px; border:2px dashed var(--gold); border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:9px; color:var(--gold); text-align:center; line-height:1.3; padding:4px; flex-shrink:0;
  }
  .header-title h1 { font-family:'Bebas Neue',sans-serif; font-size:38px; letter-spacing:3px; color:var(--gold2); line-height:1; }
  .header-title p  { font-size:13px; color:var(--gray); letter-spacing:2px; text-transform:uppercase; margin-top:3px; }
  .header-meta { margin-left:auto; text-align:right; }
  .clock { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--white); letter-spacing:2px; line-height:1; }
  #statusBar { font-size:10px; color:var(--gray); margin-top:4px; letter-spacing:0.5px; }
  #statusBar.loading { color:var(--gold); }
  #statusBar.error   { color:var(--red); }

  .scroll-wrapper { height:990px; overflow:hidden; position:relative; }
  .scroll-track { display:flex; flex-direction:column; }

  .day-block { padding:0 32px; }
  .day-header { display:flex; align-items:center; gap:14px; padding:10px 0 6px; }
  .day-label { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--gold2); white-space:nowrap; }
  .day-divider { flex:1; height:1px; background:linear-gradient(to right,var(--gold),transparent); }
  .day-status { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; padding:3px 10px; border-radius:99px; font-weight:600; }
  .day-status.completed { background:#1F2937; color:var(--gray); }
  .day-status.today     { background:var(--gold); color:var(--navy); }
  .day-status.upcoming  { background:#1E3A5F; color:#60A5FA; }

  .matches-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding-bottom:10px; }
  .match-card {
    background:var(--navy3); border:1px solid #1F2937; border-radius:10px;
    padding:10px 14px; display:grid; grid-template-columns:1fr auto 1fr;
    align-items:center; gap:8px;
  }
  .match-card.is-completed { opacity:0.75; }
  .match-card.is-live { border-color:var(--green); box-shadow:0 0 12px rgba(34,197,94,0.25); }
  .team { display:flex; align-items:center; gap:7px; }
  .team.away { flex-direction:row-reverse; text-align:right; }
  .flag { font-size:22px; line-height:1; }
  .team-name { font-size:13px; font-weight:600; letter-spacing:0.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; }
  .match-center { display:flex; flex-direction:column; align-items:center; gap:3px; min-width:80px; }
  .score { font-family:'Bebas Neue',sans-serif; font-size:24px; letter-spacing:4px; color:var(--white); line-height:1; }
  .score.pending { font-size:14px; color:var(--gray); letter-spacing:2px; font-family:'Inter',sans-serif; font-weight:600; }
  .match-info { font-size:9px; color:var(--gray); text-align:center; letter-spacing:0.5px; line-height:1.5; }
  .group-badge { font-size:9px; font-weight:700; letter-spacing:1px; color:var(--gold); text-transform:uppercase; }
  .live-badge { background:var(--green); color:#000; font-size:8px; font-weight:700; letter-spacing:1px; padding:2px 6px; border-radius:4px; animation:pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .skeleton { background:linear-gradient(90deg,#1A2235 25%,#243050 50%,#1A2235 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:10px; height:80px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>
<body>

  <div class="logo-placeholder">ADD<br>fifa_logo<br>.jpg</div>

  { date:"Jul 14–15",     group:"SF",  home:"⚽", homeN:"Semifinals", away:"", awayN:"4 Teams", time:"TBD", venue:"Multiple Venues", id:"SF" },

  { date:"Jul 19",        group:"🏆",  home:"⚽", homeN:"WORLD CUP FINAL", away:"", awayN:"Champion", time:"3:00 PM ET", venue:"MetLife Stadium, NJ", id:"FINAL" },

/* ── live score cache: { id -> { score, status } } ── */
let scoreCache = {};

/* ═══════════════════════════════════════════════════════
   AI SCORE POLL  – calls Claude with web_search
═══════════════════════════════════════════════════════ */
async function callAPI(prompt) {
  const SYSTEM = "You are a JSON-only API. Your entire response must be a single valid JSON array. " +
    "Start with [ and end with ]. No text before, no text after, no markdown, no code fences, no explanation.";
  const res = await fetch("https://fifa-proxy.nancyamedeo.workers.dev", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 2000,
      system: SYSTEM,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!res.ok) { const err = await res.text(); throw new Error("API " + res.status + ": " + err.slice(0,200)); }
  const data = await res.json();
  const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
  console.log("Raw API response:", text.slice(0, 400));
  const m = text.match(/\[[\s\S]*\]/);
  if (!m) throw new Error("No JSON array in response: " + text.slice(0, 200));
  return JSON.parse(m[0]);
}

async function fetchScores() {
  setStatus("Fetching latest scores…", "loading");
  try {
    const today = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const SKIP = ["MD2-EH","MD2-IL","MD3","R32","R16","QF","SF","3PL","FINAL"];
    const all = FIXTURES.filter(f => !SKIP.includes(f.id));
    const batch1 = all.slice(0, 16);
    const batch2 = all.slice(16);

    function makePrompt(fixtures) {
      const list = fixtures.map(f => f.id + ": " + f.homeN + " vs " + f.awayN + " (" + f.date + ")").join("\n");
      return "Today is " + today + ". Search for 2026 FIFA World Cup scores.\n" +
        "Return a JSON array. Each element: {\"id\":\"<id>\",\"score\":\"<h>-<a> or null\",\"status\":\"completed|live|upcoming\"}\n" +
        "Matches:\n" + list;
    }

    const [r1, r2] = await Promise.all([callAPI(makePrompt(batch1)), callAPI(makePrompt(batch2))]);
    [...r1, ...r2].forEach(r => { scoreCache[r.id] = { score: r.score, status: r.status }; });

    const now = new Date();
    setStatus("Scores updated " + now.toLocaleTimeString() + " · Next update in 1 hr", "");
  } catch(e) {
    console.error("Score fetch error:", e);
    setStatus("Score update failed — retrying next cycle", "error");
  }
  renderSchedule();
}

/* ── UI helpers ── */
function setStatus(msg, cls) {
  const el = document.getElementById("statusBar");
  el.textContent = msg;
  el.className = cls || "";
}

/* ── RENDER ── */
function groupByDate(arr) {
  const map = new Map();
  arr.forEach(m => { if (!map.has(m.date)) map.set(m.date, []); map.get(m.date).push(m); });
  return map;
}

function buildCard(m) {
  const cached = scoreCache[m.id] || {};
  const status = cached.status || "upcoming";
  const score  = cached.score || null;

  const today = new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  let dayStatus = status === "completed" ? "completed"
                : status === "live"      ? "live"
                : m.date.includes(today) ? "today"
                : "upcoming";

  const scoreHTML = score
    ? `<div class="score">${score.replace("-","–")}</div>`
    : `<div class="score pending">${m.time}</div>`;

  const badge = status === "live"
    ? `<span class="live-badge">LIVE</span>`
    : `<span class="group-badge">GROUP ${m.group}</span>`;

  return `<div class="match-card ${status === 'completed' ? 'is-completed' : ''} ${status === 'live' ? 'is-live' : ''}">
    <div class="team"><span class="flag">${m.home}</span><span class="team-name">${m.homeN}</span></div>
    <div class="match-center">${scoreHTML}${badge}<div class="match-info">${m.venue}</div></div>
    <div class="team away"><span class="flag">${m.away}</span><span class="team-name">${m.awayN}</span></div>
  </div>`;
}

function renderSchedule() {
  const track = document.getElementById("scrollTrack");
  const groups = groupByDate(FIXTURES);
  let html = "";
  groups.forEach((matches, date) => {
    const s = scoreCache[matches[0]?.id]?.status || "upcoming";
    const statusClass = s === "completed" ? "completed" : s === "live" ? "today" : "upcoming";
    const label = s === "completed" ? "Completed" : s === "live" ? "Live" : "Upcoming";
    html += `<div class="day-block">
      <div class="day-header">
        <span class="day-label">${date}</span>
        <div class="day-divider"></div>
        <span class="day-status ${statusClass}">${label}</span>
      </div>
      <div class="matches-grid">${matches.map(buildCard).join("")}</div>
    </div>`;
  });
  track.innerHTML = html + html; // duplicate for infinite scroll
  startScroll();
}

/* ── AUTO SCROLL ── */
let scrollPos = 0, scrollRAF = null;
function startScroll() {
  if (scrollRAF) cancelAnimationFrame(scrollRAF);
  const track = document.getElementById("scrollTrack");
  const half  = track.scrollHeight / 2;
  function step() {
    scrollPos += 0.55;
    if (scrollPos >= half) scrollPos = 0;
    track.style.transform = `translateY(-${scrollPos}px)`;
    scrollRAF = requestAnimationFrame(step);
  }
  scrollRAF = requestAnimationFrame(step);
}

/* ── CLOCK ── */
function updateClock() {
  const n = new Date();
  document.getElementById("clock").textContent =
    n.getHours().toString().padStart(2,"0") + ":" + n.getMinutes().toString().padStart(2,"0");
}

/* ── BOOT ── */
fetchScores();
setInterval(fetchScores, 60 * 60 * 1000);   // re-poll every hour
setTimeout(() => location.reload(), 15 * 60 * 1000); // hard refresh every 15 min
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
